name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache openFrameworks (compiled for Emscripten)
        id: of-cache
        uses: actions/cache@v4
        with:
          path: /opt/of
          key: of-0.12.1-emscripten-emsdk-4.0.4-v3-nosourcemap

      - name: Download openFrameworks source
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          wget -q -O of.tar.gz \
            https://github.com/openframeworks/openFrameworks/archive/refs/tags/0.12.1.tar.gz
          sudo mkdir -p /opt/of
          sudo tar -xzf of.tar.gz -C /opt/of --strip-components=1
          sudo chown -R $USER:$USER /opt/of

      - name: Download emscripten third-party libs
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          cd /opt/of
          ./scripts/emscripten/download_libs.sh

      - name: Pull Emscripten Docker image
        run: docker pull emscripten/emsdk:4.0.4

      - name: Start Emscripten container
        run: |
          docker run -di --name em \
            -v /opt/of:/opt/of \
            -v $PWD:/project \
            emscripten/emsdk:4.0.4 bash

      - name: Patch oF emscripten config
        run: |
          CFG=/opt/of/libs/openFrameworksCompiled/project/emscripten/config.emscripten.default.mk
          # reallocarray resolved at runtime via emscripten JS
          sed -i 's/-sERROR_ON_UNDEFINED_SYMBOLS=1/-sERROR_ON_UNDEFINED_SYMBOLS=0/' "$CFG"
          # Remove pthread - requires SharedArrayBuffer/COOP+COEP headers not available on itch.io
          sed -i 's/PLATFORM_PTHREAD = .*/PLATFORM_PTHREAD =/' "$CFG"
          sed -i 's/CFLAG_PLATFORM_PTHREAD = .*/CFLAG_PLATFORM_PTHREAD =/' "$CFG"
          # Remove source map - emscripten waits for .wasm.map before starting, causes hang on itch.io
          sed -i 's/-gsource-map//g' "$CFG"
          sed -i 's/-sLOAD_SOURCE_MAP=1//g' "$CFG"

      - name: Patch oF random engine for Emscripten
        run: |
          RNG=/opt/of/libs/openFrameworks/utils/ofRandomEngine.h
          perl -0pi -e 's/#include <random>/#include <chrono>\n#include <random>/' "$RNG"
          perl -0pi -e 's/std::random_device rd_ \{\};\n\tstd::seed_seq seq_ \{ rd_\(\), rd_\(\), rd_\(\), rd_\(\) \}; \/\/ 4 is considered fine for non-cryptographic needs\n\tstd::mt19937 gen_ \{ seq_ \};/#ifdef TARGET_EMSCRIPTEN\n\tstd::mt19937 gen_ { static_cast<std::mt19937::result_type>(std::chrono::steady_clock::now().time_since_epoch().count()) };\n#else\n\tstd::random_device rd_ {};\n\tstd::seed_seq seq_ { rd_(), rd_(), rd_(), rd_() }; \/\/ 4 is considered fine for non-cryptographic needs\n\tstd::mt19937 gen_ { seq_ };\n#endif/' "$RNG"

      - name: Compile openFrameworks core for Emscripten
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          docker exec em bash -c '
            cd /opt/of/libs/openFrameworksCompiled/project
            sed -i "s/PLATFORM_OPTIMIZATION_CFLAGS_DEBUG = .*/PLATFORM_OPTIMIZATION_CFLAGS_DEBUG = -g0/" \
              emscripten/config.emscripten.default.mk
            emmake make -j$(nproc) Release
          '

      - name: Build project
        run: |
          docker exec em bash -c '
            cd /project
            emmake make OF_ROOT=/opt/of -j$(nproc) Release
          '

      - name: Collect web output
        run: |
          mkdir _site
          # oF emscripten outputs to bin/em/<project_name>/
          find bin/em -type f \
            \( -name "*.html" -o -name "*.js" -o -name "*.wasm" -o -name "*.data" \
               -o -name "*.css" -o -name ".htaccess" \) \
            -exec cp {} _site/ \;
          ls -la bin/em/ || true
          ls -la _site/

      - name: Patch generated Emscripten target lookup
        run: |
          perl -0pi -e 's/var findEventTarget=target=>\{target=maybeCStringToJsString\(target\);var domElement=specialHTMLTargets\[target\]\|\|\(typeof document!=\"undefined\"\?document\.querySelector\(target\):null\);return domElement\}/var findEventTarget=target=>{target=maybeCStringToJsString(target);if(target === \"\" && typeof document!=\"undefined\"){return document.querySelector(\"#canvas\")}var domElement=specialHTMLTargets[target]||(typeof document!=\"undefined\"?document.querySelector(target):null);return domElement}/' _site/index.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: _site_tar

      - name: Extract artifact
        run: |
          mkdir _site
          tar -xf _site_tar/artifact.tar -C _site

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler

      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push _site aparinelli/prueba-camara:html5
